name: Weekly AFL Tips

on:
  schedule:
    - cron: '0 23 * * 3'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-tips:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify dependencies
        run: |
          python -c "
          import requests, feedparser, bs4, lxml
          from bs4 import BeautifulSoup
          BeautifulSoup('<div/>', 'lxml')
          print('All dependencies verified OK')
          "

      - name: Run weekly predictions
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -e
          python -u run_weekly.py
          test -f predictions.json || (echo "predictions.json not created" && exit 1)

      - name: Commit results back to repo
        run: |
          git config --global user.email "afl-agent@github-actions"
          git config --global user.name "AFL Tipping Agent"
          git add predictions_history.json predictions.json
          git diff --staged --quiet || git commit -m "chore: auto-update predictions history [$(date +'%Y-%m-%d')]"
          git push
